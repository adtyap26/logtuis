version: 2

project_name: logtuis

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: logtuis
    env:
      - CGO_ENABLED=0        # static binary, no libc dependency
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w                # strip symbol table and debug info
    flags:
      - -trimpath            # remove local build paths from binary

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
