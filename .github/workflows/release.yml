name: Release

on:
  push:
    tags:
      - "v*"

# Minimal permissions — only allow writing releases, nothing else
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # goreleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@9c156aada1db8b25f97c4a98a3fab3b4eaaec5b0 # v6.3.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # GITHUB_TOKEN is auto-provided by GitHub Actions — never store this manually
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
